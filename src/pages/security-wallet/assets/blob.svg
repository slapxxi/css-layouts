<svg
      >
        <defs>
          <mask id="mask">
            <ellipse cx="50%" cy="50%" rx="50%" ry="50%" fill="url(#grad)" />
          </mask>
          <radialGradient id="grad" cx="50%" cy="50%" r="60%" fx="50%" fy="50%">
            <stop offset="0%" stopColor="#fff" />
            <stop offset="100%" stopColor="#000" />
          </radialGradient>
          <pattern
            id="dots"
            x="0"
            y="0"
            width="20"
            height="20"
            patternUnits="userSpaceOnUse"
            patternTransform="scale(.7)"
          >
            <circle cx="2" cy="2" r="1.2" fill="#7a5cff" opacity="0.5" />
            <circle cx="10" cy="6" r="1" fill="#7a5cff" opacity="0.3" />
            <circle cx="16" cy="14" r="1.3" fill="#7a5cff" opacity="0.4" />
            <circle cx="6" cy="16" r="0.9" fill="#7a5cff" opacity="0.25" />
          </pattern>

          <filter id="glow">
            <feGaussianBlur stdDeviation="0.8" result="coloredBlur" />
            <feMerge>
              <feMergeNode in="coloredBlur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <ellipse
          cx="50%"
          cy="50%"
          rx="50%"
          ry="50%"
          class="fill-purple-950 blur-xl"
        />
        <ellipse
          cx="50%"
          cy="50%"
          rx="50%"
          ry="50%"
          fill="url(#dots)"
          filter="url(#glow)"
          mask="url(#mask)"
        />
      </svg>
